<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCOMO × HugeGraph · Agent Memory Benchmark 演示</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
:root{--bg:#f5f6f8;--bg2:#fff;--bg3:#eef0f4;--card:#fff;--text:#1a1d28;--text2:#5a6070;--text3:#9ba0ac;--border:#dde0e8;--accent:#3b82f6;--accent2:#8b5cf6;--accent3:#06b6d4;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--pink:#ec4899;--orange:#f97316;--gradient:linear-gradient(135deg,#3b82f6,#8b5cf6,#ec4899);--shadow:0 2px 12px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"SF Pro Display","PingFang SC","Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;}
.logo h1{font-size:15px;font-weight:700;}.logo h1 span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(16,185,129,.4);}
.conn-dot.err{background:var(--red);}
.conn-text{font-size:11px;color:var(--text2);}
.btn{border:none;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--gradient);color:#fff;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.btn-primary:disabled{opacity:.5;pointer-events:none;}
.btn-outline{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.main{display:flex;flex:1;overflow:hidden;}
.left{flex:0 0 380px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg2);}
.center{flex:1;display:flex;flex-direction:column;background:var(--bg);}
.right{flex:0 0 380px;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--bg2);}
.panel-header{padding:8px 12px;border-bottom:1px solid var(--border);font-weight:700;font-size:12px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;}
.panel-body{flex:1;overflow-y:auto;padding:10px;}
/* Session list */
.session-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.session-card:hover{border-color:var(--accent);box-shadow:var(--shadow);}
.session-card.active{border-color:var(--accent);background:rgba(59,130,246,.05);}
.session-card .sid{font-size:10px;color:var(--text3);font-family:monospace;}
.session-card .speakers{font-weight:700;font-size:12px;margin:2px 0;}
.session-card .meta{font-size:10px;color:var(--text2);display:flex;gap:8px;}
/* Conversation */
.conv-turn{padding:6px 10px;border-radius:8px;margin-bottom:4px;font-size:12px;}
.conv-turn.a{background:rgba(59,130,246,.08);border-left:3px solid var(--accent);}
.conv-turn.b{background:rgba(16,185,129,.08);border-left:3px solid var(--green);}
.conv-turn .sp{font-weight:700;font-size:10px;color:var(--text2);}
.conv-turn .ts{font-size:9px;color:var(--text3);}
/* QA */
.qa-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;}
.qa-card .q{font-weight:700;font-size:12px;color:var(--text);}
.qa-card .a{font-size:11px;color:var(--green);margin-top:4px;}
.qa-card .cat{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700;display:inline-block;margin-left:4px;}
.qa-card .ev{font-size:10px;color:var(--text3);margin-top:2px;font-family:monospace;}
.qa-card .pred{font-size:11px;color:var(--accent2);margin-top:4px;border-top:1px dashed var(--border);padding-top:4px;}
.qa-card.correct{border-color:var(--green);}
.qa-card.wrong{border-color:var(--red);}
.qa-card.pending{opacity:.6;}
/* Stats */
.stat-row{display:flex;gap:12px;flex-wrap:wrap;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--bg2);}
.stat{display:flex;align-items:center;gap:4px;}
.stat-val{font-size:15px;font-weight:800;}
.stat-val.blue{color:var(--accent);}.stat-val.green{color:var(--green);}
.stat-val.purple{color:var(--accent2);}.stat-val.teal{color:var(--teal);}
.stat-val.orange{color:var(--orange);}
.stat-label{font-size:9px;color:var(--text3);}
/* Progress */
.progress{height:4px;background:var(--bg3);border-radius:2px;margin-top:4px;overflow:hidden;}
.progress-bar{height:100%;background:var(--gradient);transition:width .3s;}
/* Loading */
.loading{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Cat badges */
.cat-1{background:rgba(59,130,246,.15);color:var(--accent);}
.cat-2{background:rgba(139,92,246,.15);color:var(--accent2);}
.cat-3{background:rgba(6,182,212,.15);color:var(--teal);}
.cat-4{background:rgba(245,158,11,.15);color:var(--yellow);}
.cat-5{background:rgba(236,72,153,.15);color:var(--pink);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text3);}
select,.input-field{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:11px;font-family:inherit;color:var(--text);outline:none;}
select:focus,.input-field:focus{border-color:var(--accent);}
.hg-badge{font-size:9px;background:var(--green);color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">L</div>
      <div>
        <h1><span>LOCOMO</span> × HugeGraph Agent Memory Benchmark</h1>
        <div class="logo-sub">业界标准 Agent Memory 评测数据集 · LOCOMO (snap-research) × HugeGraph 1.7.0 <span class="hg-badge">真实存储</span></div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="conn-dot" id="connDot"></div>
      <span class="conn-text" id="connText">连接中...</span>
      <button class="btn btn-outline" onclick="loadSessions()">刷新</button>
      <button class="btn btn-primary" id="runBtn" onclick="runEvaluation()">开始评测</button>
    </div>
  </div>
  <div class="stat-row" id="statsBar">
    <div class="stat"><span class="stat-val blue" id="stSessions">0</span><span class="stat-label">Sessions</span></div>
    <div class="stat"><span class="stat-val green" id="stTurns">0</span><span class="stat-label">对话轮次</span></div>
    <div class="stat"><span class="stat-val purple" id="stQA">0</span><span class="stat-label">QA对</span></div>
    <div class="stat"><span class="stat-val teal" id="stEntities">0</span><span class="stat-label">HugeGraph实体</span></div>
    <div class="stat"><span class="stat-val orange" id="stEvaluated">0</span><span class="stat-label">已评测</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--green)" id="stAccuracy">0%</span><span class="stat-label">准确率</span></div>
  </div>
  <div class="main">
    <div class="left">
      <div class="panel-header">会话列表 (LOCOMO 10 sessions)
        <select id="catFilter" onchange="filterQA()" style="font-size:10px;">
          <option value="0">全部分类</option>
          <option value="1">1-单跳事实</option>
          <option value="2">2-多跳推理</option>
          <option value="3">3-时间推理</option>
          <option value="4">4-开放性</option>
          <option value="5">5-否定推理</option>
        </select>
      </div>
      <div class="panel-body" id="sessionList"></div>
    </div>
    <div class="center">
      <div class="panel-header">
        <span id="convTitle">选择左侧会话查看对话</span>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn btn-outline" onclick="ingestSession()" style="font-size:10px;padding:3px 8px;">导入HugeGraph</button>
          <span id="ingestStatus" style="font-size:10px;color:var(--text3);"></span>
        </div>
      </div>
      <div class="panel-body" id="convArea" style="display:flex;flex-direction:column;gap:0;">
        <div style="color:var(--text3);text-align:center;padding:40px;">点击左侧会话查看 LOCOMO 真实对话</div>
      </div>
    </div>
    <div class="right">
      <div class="panel-header">QA 问答对 <span id="qaCount" style="font-size:10px;color:var(--text3);">0</span></div>
      <div class="panel-body" id="qaArea">
        <div style="color:var(--text3);text-align:center;padding:40px;">选择会话后显示QA对</div>
      </div>
    </div>
  </div>
</div>
<script>
const MEM_API='http://127.0.0.1:8765';
const LOCOMO_API='http://127.0.0.1:8766';
let sessions=[], currentSession=null, allQA=[], evalResults={}, running=false;

async function api(base,path,opts={}){const r=await fetch(base+path,opts);return r.json();}
async function memApi(path,opts={}){return api(MEM_API,path,opts);}
async function memPost(path,body){return memApi(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}
async function locomoApi(path){return api(LOCOMO_API,path);}

async function checkConn(){
  try{const d=await memApi('/api/stats');setConn(true);updateStats(d);return d;}
  catch(e){setConn(false);return null;}
}
function setConn(ok){document.getElementById('connDot').className='conn-dot'+(ok?'':' err');document.getElementById('connText').textContent=ok?'Memory Server 已连接':'Memory Server 未连接';}

function updateStats(d){
  document.getElementById('stEntities').textContent=(d.entities||0);
  document.getElementById('stTurns').textContent=5882;
  document.getElementById('stQA').textContent=1986;
  document.getElementById('stSessions').textContent=10;
}

async function loadSessions(){
  try{
    sessions=await locomoApi('/api/locomo/sessions');
    const el=document.getElementById('sessionList');
    el.innerHTML=sessions.map(function(s){
      return '<div class="session-card" onclick="selectSession(\''+s.sample_id+'\')">'+
        '<div class="sid">'+s.sample_id+'</div>'+
        '<div class="speakers">'+s.speaker_a+' ↔ '+s.speaker_b+'</div>'+
        '<div class="meta"><span>'+s.turn_count+' turns</span><span>'+s.qa_count+' QA</span></div>'+
        '<div style="font-size:10px;color:var(--text3);margin-top:2px;">'+(s.summary_preview||'').substring(0,80)+'...</div>'+
        '</div>';
    }).join('');
    checkConn();
  }catch(e){document.getElementById('sessionList').innerHTML='<div style="color:var(--red);">加载失败: '+e.message+'</div>';}
}

async function selectSession(sampleId){
  document.querySelectorAll('.session-card').forEach(function(c){c.classList.remove('active');});
  event.target.closest('.session-card').classList.add('active');
  try{
    currentSession=await locomoApi('/api/locomo/session/'+sampleId);
    renderConversation(currentSession);
    renderQA(currentSession);
  }catch(e){console.error(e);}
}

function renderConversation(s){
  document.getElementById('convTitle').textContent=s.sample_id+' · '+s.speaker_a+' ↔ '+s.speaker_b+' ('+s.turns.length+' turns)';
  const el=document.getElementById('convArea');
  el.innerHTML=s.turns.map(function(t){
    const cls=t.speaker===s.speaker_a?'a':'b';
    return '<div class="conv-turn '+cls+'"><span class="sp">'+t.speaker+'</span> <span class="ts">'+t.session+' '+t.date+'</span><br>'+t.text+'</div>';
  }).join('');
  el.scrollTop=0;
}

function renderQA(s){
  allQA=s.qa_pairs;
  filterQA();
}

function filterQA(){
  const cat=parseInt(document.getElementById('catFilter').value);
  const filtered=cat===0?allQA:allQA.filter(function(q){return q.category===cat;});
  document.getElementById('qaCount').textContent=filtered.length;
  const el=document.getElementById('qaArea');
  if(!filtered.length){el.innerHTML='<div style="color:var(--text3);text-align:center;padding:20px;">无QA对</div>';return;}
  el.innerHTML=filtered.map(function(q,i){
    const r=evalResults[q.question];
    const statusClass=r?(r.correct?'correct':'wrong'):'pending';
    const catLabel={1:'单跳',2:'多跳',3:'时间',4:'开放',5:'否定'}[q.category]||q.category;
    return '<div class="qa-card '+statusClass+'">'+
      '<div class="q">Q: '+q.question+' <span class="cat cat-'+q.category+'">'+catLabel+'</span></div>'+
      '<div class="a">A(标准): '+q.answer+'</div>'+
      (q.evidence&&q.evidence.length?'<div class="ev">证据: '+q.evidence.join(', ')+'</div>':'')+
      (r?'<div class="pred"><b>预测:</b> '+r.prediction+' <span style="color:'+(r.correct?'var(--green)':'var(--red)')+';font-weight:700;">'+(r.correct?'✓ 正确':'✗ 错误')+'</span> <span style="color:var(--text3);font-size:9px;">'+r.latency_ms+'ms</span></div>':'')+
      '</div>';
  }).join('');
}

async function ingestSession(){
  if(!currentSession){alert('请先选择会话');return;}
  const status=document.getElementById('ingestStatus');
  status.innerHTML='<span class="loading"></span> 导入中...';
  try{
    // Ingest first 10 turns as memories (to avoid timeout)
    const turns=currentSession.turns.slice(0,10);
    let ingested=0;
    for(const t of turns){
      const content=t.speaker+': '+t.text;
      await memPost('/api/memory/add',{content:content,user_id:'locomo_'+currentSession.sample_id});
      ingested++;
      status.textContent='已导入 '+ingested+'/'+turns.length;
    }
    status.innerHTML='<span style="color:var(--green);">✓ 导入 '+ingested+' 条记忆到 HugeGraph</span>';
    setTimeout(function(){status.textContent='';},3000);
    checkConn();
  }catch(e){status.innerHTML='<span style="color:var(--red);">导入失败: '+e.message+'</span>';}
}

async function runEvaluation(){
  if(running)return;
  if(!currentSession){alert('请先选择一个会话');return;}
  running=true;
  const btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='评测中...';
  const qas=currentSession.qa_pairs;
  let correct=0,evaluated=0;
  // First ingest the conversation
  await ingestSessionAuto();
  // Then evaluate each QA
  for(let i=0;i<qas.length;i++){
    const q=qas[i];
    try{
      const r=await memPost('/api/memory/search',{query:q.question,user_id:'locomo_'+currentSession.sample_id,top_k:3});
      const pred=r.answer||'';
      const isCorrect=pred.toLowerCase().indexOf(q.answer.toLowerCase())>=0||q.answer.toLowerCase().indexOf(pred.toLowerCase())>=0;
      evalResults[q.question]={prediction:pred,correct:isCorrect,latency_ms:r.total_elapsed_ms||0};
      if(isCorrect)correct++;
      evaluated++;
      document.getElementById('stEvaluated').textContent=evaluated;
      document.getElementById('stAccuracy').textContent=((correct/evaluated)*100).toFixed(0)+'%';
      if(i%3===0)renderQA(currentSession);
    }catch(e){console.error(e);}
    if(i%10===9){
      btn.textContent='评测中 '+(i+1)+'/'+qas.length;
    }
  }
  renderQA(currentSession);
  btn.disabled=false;btn.textContent='开始评测';running=false;
  alert('评测完成! 准确率: '+((correct/evaluated)*100).toFixed(1)+'% ('+correct+'/'+evaluated+')');
}

async function ingestSessionAuto(){
  if(!currentSession)return;
  const turns=currentSession.turns.slice(0,15);
  for(const t of turns){
    try{await memPost('/api/memory/add',{content:t.speaker+': '+t.text,user_id:'locomo_'+currentSession.sample_id});}catch(e){}
  }
}

(async function(){
  renderConversation;
  const d=await checkConn();
  if(!d){alert('Memory Server 未连接 (127.0.0.1:8765)，请先启动 memory_backend.py');}
  await loadSessions();
})();
</script>
</body>
</html>
